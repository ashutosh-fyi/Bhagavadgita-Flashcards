<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>गीता समागम — अध्याय ३ फ्लैशकार्ड</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tiro+Devanagari+Hindi:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&display=swap');

  :root {
    --saffron: #c0601f;
    --saffron-light: #e8a54b;
    --deep-red: #8b1a1a;
    --maroon: #5c1010;
    --gold: #c9a84c;
    --gold-light: #e8d48b;
    --cream: #faf3e0;
    --parchment: #f5e6c8;
    --parchment-dark: #e8d3a8;
    --ink: #2c1810;
    --ink-light: #4a3428;
    --border-ornate: #b8860b;
    --sidebar-bg: #3d1a0a;
    --sidebar-text: #e8d3a8;
    --sidebar-hover: #5c2a14;
    --sidebar-active: #7a3a1a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cormorant Garamond', 'Tiro Devanagari Hindi', Georgia, serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    width: 100%;
    text-align: center;
    padding: 1.25rem 1rem 0.75rem;
    background: linear-gradient(180deg, var(--maroon) 0%, var(--deep-red) 100%);
    color: var(--cream);
    border-bottom: 3px solid var(--gold);
    position: relative;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    font-family: 'Tiro Devanagari Hindi', serif;
  }

  .header-sub {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.5rem;
    margin-top: 0.3rem;
  }

  .header-sub .subtitle {
    font-size: 0.85rem;
    color: var(--gold-light);
    font-style: italic;
  }

  .header-sub .sanscrit {
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: var(--gold-light);
    font-family: 'Tiro Devanagari Hindi', serif;
    opacity: 0.8;
  }

  /* ── Layout ── */
  .app {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    display: flex;
    flex-direction: column;
    border-right: 2px solid var(--gold);
    overflow: hidden;
  }

  .sidebar-header {
    padding: 1rem 1rem 0.6rem;
    border-bottom: 1px solid rgba(201,168,76,0.2);
    flex-shrink: 0;
  }

  .sidebar-header h2 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--gold);
    font-weight: 600;
  }

  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem 0;
  }

  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

  .verse-group {
    margin-bottom: 0.25rem;
  }

  .verse-btn {
    width: 100%;
    text-align: left;
    font-family: inherit;
    font-size: 0.95rem;
    padding: 0.6rem 1rem;
    border: none;
    background: transparent;
    color: var(--sidebar-text);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.5rem;
  }

  .verse-btn:hover {
    background: var(--sidebar-hover);
  }

  .verse-btn.active {
    background: var(--sidebar-active);
    color: var(--gold-light);
    border-left: 3px solid var(--gold);
    font-weight: 600;
  }

  .verse-btn .verse-num {
    font-weight: 700;
    color: var(--gold);
    font-size: 0.85rem;
    min-width: 2.5rem;
  }

  .verse-btn .verse-label {
    flex: 1;
    font-size: 0.8rem;
    opacity: 0.75;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .verse-btn .verse-count {
    font-size: 0.7rem;
    background: rgba(201,168,76,0.15);
    color: var(--gold);
    padding: 0.15rem 0.45rem;
    border-radius: 8px;
    min-width: 1.5rem;
    text-align: center;
  }

  .verse-btn.active .verse-count {
    background: rgba(201,168,76,0.3);
  }

  /* All button at top */
  .verse-btn.all-btn {
    border-bottom: 1px solid rgba(201,168,76,0.15);
    padding-bottom: 0.7rem;
    margin-bottom: 0.25rem;
  }

  /* ── Sidebar footer ── */
  .sidebar-footer {
    flex-shrink: 0;
    padding: 0.75rem;
    border-top: 1px solid rgba(201,168,76,0.2);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .music-toggle {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-family: inherit;
    font-size: 0.8rem;
    color: var(--sidebar-text);
    background: transparent;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 6px;
    padding: 0.5rem 0.7rem;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    text-align: left;
  }

  .music-toggle:hover {
    background: var(--sidebar-hover);
    border-color: rgba(201,168,76,0.5);
  }

  .music-toggle.playing {
    border-color: var(--gold);
    color: var(--gold-light);
  }

  .music-icon {
    font-size: 1.1rem;
    width: 1.4rem;
    text-align: center;
    flex-shrink: 0;
  }

  .music-label { flex: 1; }

  .volume-row {
    display: none;
    align-items: center;
    gap: 0.5rem;
    padding: 0 0.3rem;
  }

  .volume-row.show { display: flex; }

  .volume-row label {
    font-size: 0.7rem;
    color: var(--sidebar-text);
    opacity: 0.6;
  }

  .volume-slider {
    flex: 1;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: rgba(201,168,76,0.3);
    border-radius: 2px;
    outline: none;
  }

  .volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px;
    height: 12px;
    background: var(--gold);
    border-radius: 50%;
    cursor: pointer;
  }

  /* ── Main ── */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
    padding: 1.5rem 2rem 2rem;
    background-image:
      radial-gradient(circle at 20% 50%, rgba(192,96,31,0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 50%, rgba(139,26,26,0.03) 0%, transparent 50%);
  }

  /* ── Top bar: shuffle + progress ── */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: min(720px, 100%);
    margin-bottom: 1rem;
  }

  .shuffle-btn {
    font-family: inherit;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 0.5rem 1.2rem;
    border: 2px solid var(--border-ornate);
    border-radius: 6px;
    background: var(--parchment);
    color: var(--maroon);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .shuffle-btn:hover {
    background: var(--maroon);
    color: var(--cream);
  }

  .shuffle-btn.shuffled {
    background: var(--maroon);
    color: var(--cream);
    border-color: var(--maroon);
  }

  .progress-bar {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .progress-track {
    flex: 1;
    height: 5px;
    background: var(--parchment-dark);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--saffron), var(--gold));
    border-radius: 3px;
    transition: width 0.3s ease;
  }

  .progress-text {
    font-size: 0.85rem;
    color: var(--ink-light);
    white-space: nowrap;
  }

  /* ── Card ── */
  .card-scene {
    width: min(720px, 100%);
    perspective: 1200px;
    margin-bottom: 1.25rem;
  }

  .card {
    position: relative;
    width: 100%;
    min-height: 360px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .card.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border: 3px solid var(--border-ornate);
    border-radius: 10px;
    padding: 2rem 2.5rem 1.5rem;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    box-shadow:
      inset 0 0 0 1px var(--gold-light),
      0 4px 24px rgba(44,24,16,0.1);
  }

  .card-front {
    background: linear-gradient(135deg, var(--parchment) 0%, var(--cream) 50%, var(--parchment) 100%);
  }

  .card-back {
    background: linear-gradient(135deg, var(--cream) 0%, var(--parchment) 50%, var(--cream) 100%);
    transform: rotateY(180deg);
  }

  .card-face::before, .card-face::after {
    content: '॰';
    position: absolute;
    color: var(--gold);
    font-size: 1.4rem;
    opacity: 0.5;
    font-family: 'Tiro Devanagari Hindi', serif;
  }
  .card-face::before { top: 6px; left: 12px; }
  .card-face::after { bottom: 6px; right: 12px; }

  .card-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--saffron);
    margin-bottom: 0.75rem;
    font-weight: 600;
  }

  .card-content {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card-content h2 {
    font-size: 1.3rem;
    font-weight: 600;
    line-height: 1.55;
    color: var(--maroon);
    text-align: center;
  }

  .card-content p, .card-content ol, .card-content ul {
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--ink);
  }

  .card-content ol, .card-content ul { padding-left: 1.5rem; }
  .card-content li { margin-bottom: 0.5rem; }
  .card-content strong { color: var(--deep-red); }
  .card-content em { color: var(--saffron); font-style: italic; }

  .card-hint {
    text-align: center;
    font-size: 0.75rem;
    color: var(--ink-light);
    opacity: 0.4;
    margin-top: 1rem;
    font-style: italic;
  }

  .mobile-hint { display: none; }
  @media (max-width: 768px) {
    .mobile-hint { display: inline; }
    .desktop-hint { display: none; }
    .keyboard-hints { display: none; }
  }

  /* ── Nav ── */
  .nav {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1.25rem;
    width: min(720px, 100%);
  }

  .nav-btn {
    font-family: inherit;
    font-size: 1.4rem;
    width: 46px;
    height: 46px;
    border: 2px solid var(--border-ornate);
    border-radius: 50%;
    background: var(--parchment);
    color: var(--maroon);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .nav-btn:hover:not(:disabled) {
    background: var(--maroon);
    color: var(--cream);
  }

  .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  .nav-counter {
    font-size: 1rem;
    color: var(--ink-light);
    font-weight: 600;
    min-width: 4rem;
    text-align: center;
  }

  .keyboard-hints {
    text-align: center;
    font-size: 0.75rem;
    color: var(--ink-light);
    opacity: 0.4;
    margin-top: 1.25rem;
  }

  .keyboard-hints kbd {
    font-family: inherit;
    background: var(--parchment-dark);
    border: 1px solid var(--border-ornate);
    border-radius: 3px;
    padding: 0.1rem 0.35rem;
    font-size: 0.7rem;
  }

  /* ── Mobile ── */
  .sidebar-toggle {
    display: none;
    position: fixed;
    bottom: 1rem;
    left: 1rem;
    z-index: 100;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 2px solid var(--gold);
    background: var(--sidebar-bg);
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  }

  @media (max-width: 768px) {
    .sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 90;
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      width: 260px;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-toggle { display: flex; align-items: center; justify-content: center; }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 89;
    }
    .sidebar-overlay.show { display: block; }
    .main { padding: 1rem 1rem 4rem; }
    .card-face { padding: 1.5rem 1.25rem 1rem; }
    .card-content h2 { font-size: 1.15rem; }
    .card-content p, .card-content ol { font-size: 0.95rem; }
    .card { min-height: 300px; }
    header h1 { font-size: 1.3rem; }
  }
</style>
</head>

<header>
  <h1>गीता समागम — अध्याय ३</h1>
  <div class="header-sub">
    <span class="sanscrit">॥ श्रीमद्भगवद्गीता ॥</span>
    <span class="subtitle">Karma Yoga &middot; Verses 1&ndash;13</span>
  </div>
</header>

<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><h2>श्लोक &middot; Verses</h2></div>
    <nav class="sidebar-list" id="sidebarList"></nav>

      <button class="music-toggle" id="musicBtn">
        <span class="music-icon" id="musicIcon">&#9835;</span>

      </button>
      <div class="volume-row" id="volumeRow">
        <label>Vol</label>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="30">
      </div>
    </div>
  </aside>

  <!-- Mobile overlay + toggle -->
  <div class="sidebar-overlay" id="overlay"></div>

  <!-- Main content -->
  <div class="main">
    <div class="top-bar">
      <button class="shuffle-btn" id="shuffleBtn">
        <span>&#8645;</span> Shuffle
      </button>

        <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
        <span class="progress-text" id="progressText">1 / 1</span>
      </div>
    </div>

    <div class="card-scene">
      <div class="card" id="card">

          <div class="card-label">प्रश्न — Question</div>

<script>

const RAW_CARDS = [
  {front:`<h2>3.1 How does the knower relate to right action?</h2>`,back:`<p>The knower doesn't <em>do</em> right action — they stop obstructing it. Right action is self-arising (like rain from clouds). The ego's only contribution is interference. "Get out of your own way."</p>`},
  {front:`<h2>3.1 What are the four pairings of knowledge and action, and which is the only true one?</h2>`,back:`<ol><li>Ignorance + Inaction — doubly false (no true ignorance, no true inaction)</li><li>Ignorance + Action — the common worldly person (sakaam karma)</li><li>Knowledge + Inaction — the false renunciant (what Arjun wants)</li><li><strong>Knowledge + Action</strong> — the only true pairing (turiya). The other three are all fraud.</li></ol>`},
  {front:`<h2>3.1 What is the most practical form of self-observation?</h2>`,back:`<p>Karm avalokan (action observation). The hierarchy from subtlest to easiest: vritti → bhaav → vichaar → karm. Thoughts require some meditation to observe, emotions arise involuntarily, but your actions — even a CCTV can see those. Start there.</p>`},
  {front:`<h2>3.1 Why is "knowledge without action" a self-contradiction?</h2>`,back:`<p>True knowledge is like the sun — if it exists, light (action) is inevitable. You can't lock the sun in a room. If knowledge doesn't show in your life as nishkaam karma, it was never real knowledge — just a claim.</p>`},
  {front:`<h2>3.1 What is Arjun's trick in the first shloka, and what does it reveal?</h2>`,back:`<p>Krishna praised knowledge to inspire right action. Arjun flips this: "If knowledge is supreme, I'll just be a knower — no need to fight." He weaponizes the teaching to serve his existing desire (avoidance). The ego will co-opt even spiritual teachings to protect itself.</p>`},
  {front:`<h2>3.1 How can you verify whether someone (including yourself) has knowledge?</h2>`,back:`<p>Look at their actions. Knowledge absence can't be detected directly (unlike a missing towel), so false claims of knowledge are easy. But if daily actions are desire-driven (sakaam), there is ignorance — no matter what is claimed.</p>`},
  {front:`<h2>3.1 Why can't jnana yoga, karma yoga, and bhakti yoga be separate paths?</h2>`,back:`<p>Knowledge that doesn't become action is false. Action without knowledge is blind (sakaam). And knowledge can't arise without love (bhakti) — you must want liberation before it comes. They are one inseparable movement, not three choices.</p>`},
  {front:`<h2>3.3-5 Why is the sleeping driver's occasional success dangerous?</h2>`,back:`<p>An unconscious person sometimes gets good results by coincidence (like a sleeping driver on a straight road). This rare success convinces them their approach works, so they sleep deeper. The 1-in-10 ratio of joy to suffering reflects a life run on coincidence, not consciousness.</p>`},
  {front:`<h2>3.3-5 When hurt, what separates a human response from an animal response?</h2>`,back:`<p><strong>Animal instinct:</strong> Look outward — "Who did this to me?" All senses rush toward the source of pain.<br><br><strong>Human response:</strong> Look inward — "Who am I that I got hurt? What was so weak inside that a wound could land?"</p>`},
  {front:`<h2>3.3-5 Why is nishkarm (actionlessness) impossible but nishkaam (desirelessness) possible?</h2>`,back:`<p>Action operates at four levels: atma → vritti → vichar → karm. Even stopping physical action and thought leaves vritti (seed tendencies) intact. True freedom is only at the atma level — action still continues there, but desire doesn't. The goal was never zero action; it was zero kaamna.</p>`},
  {front:`<h2>3.3-5 Why doesn't stopping action lead to desirelessness?</h2>`,back:`<p>Desire sits inside; action is just its expression. Suppressing the tap doesn't purify the tank. If desire lives within, it will color every action — stopping one karma doesn't touch the kaamna beneath it.</p>`},
  {front:`<h2>3.3-5 What is the fundamental question swap that defines spirituality?</h2>`,back:`<p>Replace "Kya karoon?" (What should I do?) with "Kaun hoon?" (Who am I?). The first question keeps you at the surface of action. The second takes you to the source — and from the right source, right action arises on its own.</p>`},
  {front:`<h2>3.3-5 What are the two types of karm and what births each?</h2>`,back:`<p><strong>Sakaam karm</strong> — born from incompleteness. "I was so miserable I <em>had</em> to do something." Requires claiming ownership (karta bhaav) because result is needed.<br><br><strong>Nishkaam karm</strong> — born from wholeness. "I was so joyful something <em>happened through me</em>." No ownership needed because nothing is being sought.</p>`},
  {front:`<h2>3.3-5 What is the tank-and-tap principle?</h2>`,back:`<p>If the tank (inner self) is polluted, every tap (action) produces polluted water. You can't fix individual taps while the source is contaminated. This is why <em>all</em> actions from an unconscious person are wrong — not just some.</p>`},
  {front:`<h2>3.6-7 Why can't the mithyaachari practice self-observation?</h2>`,back:`<p>Looking inward is like opening a bandage on a wound — it hurts too much. The mithyaachari's inner state is so ugly that they dare not look. They can think about any worldly subject, but never about themselves. The sadaachari, through love of atma, gains the gift of looking at both world and self simultaneously — that is true witnessing (saakshi).</p>`},
  {front:`<h2>3.6-7 How does the sadaachari achieve freedom?</h2>`,back:`<p>One right decision: surrender the right to choose to the atma. After that, no more decisions are needed. Like a car towed by a massive chain — once bound to the infinite, all petty bindings become unnecessary. The absence of petty bindings IS sahajta (spontaneity).</p>`},
  {front:`<h2>3.6-7 What does it mean to be "prakritisth"?</h2>`,back:`<p>Whenever anything in the world becomes gravely important to you — an insult, a desire, a worry, bodily needs — you are prakritisth. It's not a special state. It's simply giving weight to anything that arises in mind: name, form, thought, emotion. That weight IS the wrong choice.</p>`},
  {front:`<h2>3.6-7 Why does forced external restraint eventually explode?</h2>`,back:`<p>The pressure cooker effect: when the mind boils with desire but karmendriyas are forcibly suppressed, periodic release becomes necessary. The "pious" person who needs to escape periodically reveals the truth — asahaj sanyam (unnatural restraint) cannot hold forever.</p>`},
  {front:`<h2>3.6-7 What is the difference between a mithyaachari and a sadaachari?</h2>`,back:`<p><strong>Mithyaachari (hypocrite):</strong> Prakritisth aham → sakaam vishay smaran → asahaj upari sanyam. Restrains hands while mind feasts on sense objects. Predictable like a train on tracks.<br><br><strong>Sadaachari (truly virtuous):</strong> Atmasth aham → atma avalokan + nishkaam chintan → sahaj nirbadh gati. Inner alignment, so outer action flows freely. Unpredictable like a mountain river.</p>`},
  {front:`<h2>3.6-7 Why is the sadaachari's life unpredictable?</h2>`,back:`<p>The mithyaachari is fully predictable — everyone knows what they'll do next, and both sides play a comfortable mutual charade. The sadaachari is like a mountain river: sometimes turning left, sometimes right, sometimes childlike, sometimes terrifyingly sharp. No mental framework can contain them. This is why saints have been called "deewaana" — the mad ones.</p>`},
  {front:`<h2>3.8 What is dharm yuddh really about?</h2>`,back:`<p>"The fight to save your soul." Not land, power, or fame. The world attacks your essence — not just externally but at your very core. You didn't start this fight, but you must end it. Any "battle" fought for lesser purposes is like swatting mosquitoes while someone aims a Kalashnikov at you.</p>`},
  {front:`<h2>3.8 What are the three levels of consciousness regarding karm?</h2>`,back:`<ol><li><strong>Adharmik chitt:</strong> Fully identified as karta, acting for bhog. Dives into every sense object expecting sweet fruits.</li><li><strong>Dharmik chitt:</strong> The seeker/warrior. Acts with the intention of dissolving karta bhaav. "If I must act, I'll do karm that ends my doership."</li><li><strong>Mukt:</strong> Sees the entire drashta-drishya game as childish. No participation needed.</li></ol>`},
  {front:`<h2>3.8 What is karta bhaav and why is it a delusion?</h2>`,back:`<p>Prakriti is drashta (seer) and drishya (seen) mutually changing each other — an interaction, not a one-way act. The ego falsely claims credit for changes that are co-produced. Like getting green paint on your glasses at Holi and declaring "I turned the world green." You didn't cause it — it happened to you.</p>`},
  {front:`<h2>3.8 What is the paradox of niyat karm?</h2>`,back:`<p>The karta must do karm that destroys the karta itself. Karm's journey began at birth; its destination is the end of the doer. And this karm cannot feel pleasant to the ego — if you ask the karta "how does it feel?" during niyat karm, the honest answer is: not good. Feelings are not the compass here.</p>`},
  {front:`<h2>3.8 What is the true definition of niyat karm?</h2>`,back:`<p>Not "scripture-prescribed ritual." Niyat = niyati = destiny = mukti. So niyat karm = that which leads to liberation. Similarly, shastra = only that which leads to mukti. Dharma = only that which frees the aham. All three words collapse to the same single meaning.</p>`},
  {front:`<h2>3.8 What does Kabir mean by "chook chakri maahi"?</h2>`,back:`<p>"Sahab ke darbaar mein kami kahu ki naahi, banda mauj na pavahi, chook chakri maahi." There is no shortage of joy in existence. If you're not experiencing it, the deficiency is in your seva (devotion/service) — your attention was split, your loyalty divided. Joy is always fully available; it's your commitment that's partial.</p>`},
  {front:`<h2>3.8 Why does the ego cling to causation?</h2>`,back:`<p>The karta can only exist if it is a cause. No causation = no karta = ego death. So the ego projects causality even onto randomness. Prakriti is fundamentally random (like scattered rice grains following a normal distribution) — but accepting randomness is intolerable to the ego because it would make the "doer" meaningless.</p>`},
  {front:`<h2>3.9 What is gat-sang, and why does letting go require courage?</h2>`,back:`<p>Gat-sang = seeing clearly that a particular attachment cannot lead to atma, and moving beyond it. But here is the difficulty: <strong>full certainty never arrives before the sacrifice.</strong> You cannot sit in a corner and fully prove something is worthless before dropping it. At the moment of letting go, some feeling of its value remains. Bodh says "worthless," but moha says "precious." This is why yagya always involves a little dard (pain) — if it didn't hurt, it wasn't real yagya.</p>`},
  {front:`<h2>3.9 What is the real meaning of yagya?</h2>`,back:`<p>Not literal fire ritual — agnihotra is only a <strong>symbol</strong> (like an election symbol represents a candidate but doesn't become one). Yagya = sacrificing the lower for the higher. Every moment you choose a higher vishay over a lower one, that is yagya. The physical ritual points toward this: offer what is small to gain what is great. The ultimate destination of yagya is complete mukti.</p>`},
  {front:`<h2>3.9 Why does sahaj aacharan come from forgetting, not practice?</h2>`,back:`<p>Practice (abhyas) means constantly remembering — keeping a worldly thing alive in memory. But sahajta means <strong>forgetting</strong> — the rules, the norms, the self-image. Whatever can be remembered is necessarily bhautik (material); memory cannot hold atma. The truly spontaneous person acts not because they remembered the right thing to do, but because they forgot everything that was in the way.</p>`},
  {front:`<h2>3.9 What is karm bandh?</h2>`,back:`<p>The arrangement where you must <strong>remain as you are</strong> in order to receive the fruit of past karma. Like staying home for a courier while everyone else goes to a festival. You did sakaam karm, so now you must: (1) survive unchanged until the result arrives, (2) stay in the same place/condition, (3) be affected by whatever the result brings — sukh or dukh. This locks you into a downward spiral: vishay → karm → waiting → vishm phal → new vishay at the same level. Yagya breaks this cycle.</p>`},
  {front:`<h2>3.9 Why is searching for atma in prakriti like a 2nd grader searching for a PhD thesis?</h2>`,back:`<p>A child in 2nd grade is told to find their father's doctoral thesis. They search their own school bag — worksheets, textbooks, homework. They'll search for a lifetime and never find it, because the bag only contains things at their level. Similarly, prakriti is your own reflection (Ashtavakra's teaching) — it only contains things at your level of consciousness. Looking for atma in prakriti is searching for the transcendent inside a mirror of yourself.</p>`},
  {front:`<h2>3.9 What is sahajachari, and why is it a better term than sadachari?</h2>`,back:`<p>The true opposite of mithyaachari is not sadachari (socially virtuous) but <strong>sahajachari</strong> (spontaneous conduct). Sadachari suggests conformity to social/moral norms. Sahajachari means acting from inner freedom — no rehearsal, no restraint, no performance. A Zen master was asked how to endure heat and cold: "When cold, be cold. When hot, be hot." This is sahaj aacharan — the one anchored in atma has no need to manage prakriti.</p>`},
  {front:`<h2>3.9 What is the right attitude toward prakriti — enemy or bridge?</h2>`,back:`<p>Prakriti is a <strong>pul</strong> (bridge) to cross, not an enemy to destroy. The traveler bows before stepping on the bridge and bows again after crossing. "Tum na hoti to tumse aage kaise badhte? Maa." If you treat prakriti as an obstacle, the fault is yours — she offered both majhdhar (rapids) and patwar (oar). Maya is not Satan: "Ek milave Ram se, duji narak le jaye." The same maya can unite you with Ram or drag you to hell. The choice is yours.</p>`},
  {front:`<h2>3.9 What are the three things in Vedanta, and how do they simplify everything?</h2>`,back:`<p>Vedanta places only three things before you: <strong>aham</strong> (the ego-self), <strong>prakriti</strong> (bondage), and <strong>atma</strong> (liberation). No 50 topics, no elaborations. Even these three reduce further — aham and prakriti are mother and son, nearly inseparable. They only begin to look different when atma enters your life. Kabir: "Angana bhaya videsh" — what was always your own courtyard suddenly feels like foreign land. All of Vedanta's complexity collapses into one choice: prakriti or atma.</p>`},
  {front:`<h2>3.10 How does atma-avalokan stop sakaamta?</h2>`,back:`<p>Look inward and see: there are <strong>two "I"s</strong> speaking. One says "I want to listen, to learn" — that is the atma-aligned I. The other says "I want to lie down, to eat, to escape" — that is the prakriti-I. Both say "main" (I). When you observe the source of desire and recognize "that is not me," you stop running after its kaamna. The GOAT question: which "I" is speaking — the bakri (goat) or the Greatest Of All Time?</p>`},
  {front:`<h2>3.10 What are the three types — pashu, durachari, mithyachari — and their hierarchy?</h2>`,back:`<p><strong>Pashu:</strong> Operates from prakriti's center only. No pretense, no sin. An anaconda swallowing a deer has a kind of innocence — it's a machine doing what it does. No punya, no paap.<br><br><strong>Durachari:</strong> A human who chooses the animal center but makes no pretense about it. Bad, but redeemable — at least transparent.<br><br><strong>Mithyachari:</strong> A human who chooses the animal center AND wears a mask of virtue. Worst of the three — actively deceiving, and through self-deception, drifting furthest from self-knowledge.</p>`},
  {front:`<h2>3.10 Why does the durachari get liberated before the mithyachari?</h2>`,back:`<p>Angulimal came with a sword. The snake bit Mahavir. Ravan kidnapped Sita. All came face-to-face with truth — and were transformed. Open dushtta (wickedness) brings you before the divine, even if in rage. The mithyachari never arrives — they've turned their back to atma and placed a mask on the back of their head so the world thinks they're looking forward. You can come with a weapon, with poison, with curses — just come. "Nazar mila lo, kaam ho jaata hai."</p>`},
  {front:`<h2>3.10 What is the ego's most powerful defense against truth?</h2>`,back:`<p>Not hostility — <strong>indifference.</strong> The ego has no shield when face-to-face with atma; it falls the moment eyes meet. So its deepest strategy is to never show up. The guru's only real defeat is when the student refuses to come at all. This is why masters have sometimes deliberately provoked hatred — even enemies must come face-to-face. "Ranjish hi sahi, dil dukhane ke liye aa" — come even to break my heart, but come. Hostility, accusations, even violence — all are workable. Absence is not.</p>`},
  {front:`<h2>3.10 What does the verse say about creation and yagya?</h2>`,back:`<p>Prajapati created beings <strong>together with yagya</strong> — meaning the mechanism for liberation is built into existence itself. You are not born without a way out. From the very beginning, the means of rising (nishkaam karm) has been woven into the fabric of creation. Yagya is not something imposed later by scripture — it is as old and as fundamental as life itself.</p>`},
  {front:`<h2>3.10 What is the paradox of fulfilling desire?</h2>`,back:`<p>Forget all your desires, and your <strong>central desire</strong> gets fulfilled. You don't want what you think you want — proof: you want to <em>forget</em> what you want. If desires brought joy, why would you crave relief from them? The wanting itself is dukh. This is exactly what Buddha taught: life is suffering, and the eightfold path ends at freedom from kaamna. Nishkaam karm is the only way to fulfill desire — by ceasing to chase it.</p>`},
  {front:`<h2>3.10 Why is mithyachari (hypocrite) worse than durachari (openly wicked)?</h2>`,back:`<p>Durachari is openly dark — "tan man ek hi rang." Their evil is visible, and they at least don't pretend. Mithyachari deceives others with a pious exterior while rotting inside. The deeper danger: <strong>the lie boomerangs.</strong> The Mulla Nasruddin story — he tells children there's a feast in town to get rid of them, then starts running there himself ("what if it's true?"). If you care enough about others' opinions to deceive them, you'll inevitably start believing your own propaganda. Deceiving others is guaranteed self-deception.</p>`},
  {front:`<h2>3.11 What is the real meaning of yagya in the inner world?</h2>`,back:`<p>Within you exist both: one who rises toward truth and one who clings to darkness. One wants to meditate, the other resists. One wants to love, the other calculates. <strong>This is the real Mahabharata.</strong> Yagya means: strengthen your inner dev (the light-seeking impulse) by withdrawing resources — time, energy, attention — from your inner danav (the darkness-clinging impulse). Feed the friend within; starve the enemy within. Amrit Bindu Upanishad: "Mukti bhi tum ho, bandhan bhi tum ho."</p>`},
  {front:`<h2>3.11 What does "dev" actually mean, and who is a devta?</h2>`,back:`<p>Dev comes from the root "div" — to illuminate. A dev is not an external sky-deity but <strong>one who is near atma and therefore bathed in its light.</strong> Atma is pure prakash (light) — not radiation, but that which dispels ignorance and reveals things as they are. Devtva = the resolve of aham to turn its face toward atma. Just as turning toward the sun illuminates your face, turning toward atma is what makes someone "divine."</p>`},
  {front:`<h2>3.11 Why does the verse say "mutual growth" between you and devtva?</h2>`,back:`<p>A positive feedback loop: you give resources to your inner light (yagya) → your aham shifts closer to light → from that new position, your karm naturally becomes more kalyanmukhi → which further strengthens devtva. "Tum usko badhao, wo tumko badhayega." Like investing in the right stock — its value rises, and since it's your share, your wealth rises too. This is the meaning of "parasparam bhavayantah shreyah param avapsyatha."</p>`},
  {front:`<h2>3.11 What is the liberation formula hidden in the investment principle?</h2>`,back:`<p><strong>Stop feeding your bondage.</strong> It held you not out of love but because you were useful — a source of nourishment. The moment you stop giving, it releases you on its own: "zara door ja ke basiye." Then redirect those resources toward prakash. This is yagya: withdraw from the wrong stock (even at a loss — swaha), reinvest in the right one. Triple loss of wrong investment: (1) resources wasted, (2) forced to live near darkness, (3) missed the light entirely.</p>`},
  {front:`<h2>3.11 What is the scale model of aham — how does investment determine identity?</h2>`,back:`<p>Imagine a 100-unit scale: prakash (light) on one end, andhkar (darkness) on the other. If you give 80 to darkness and 20 to light, your aham's center of gravity shifts to the dark end — you <em>become</em> situated there. This is mathematical and automatic. <strong>You settle where you invest.</strong> The choice is yours only at the point of allocation; once invested, the consequence (your location on the axis) is karm phal — no longer in your hands. "Boye ped babool ke, aam kahaan se khaye?"</p>`},
  {front:`<h2>3.11 Why does feeding something create bondage?</h2>`,back:`<p>Whatever you feed — time, emotion, money, attention — <strong>captures you to keep getting fed.</strong> A new car: you invest in it, so you lock it, guard it, think about it constantly. It now occupies your mind — you've settled near it. Bondage isn't random misfortune; you purchased it yourself. And the thing you feed will never willingly release you, because your departure means its starvation. This is why bandhan tightens the more you give.</p>`},
  {front:`<h2>3.11 What is the only valid meaning of "vriddhi" (growth/progress)?</h2>`,back:`<p>Vriddhi, pragati, unnati, tarakki, vikas — all mean only one thing: <strong>movement toward satya/mukti.</strong> If your gati is not toward truth, don't call it progress. Krishna uses vriddhi specifically in the context of moving closer to atma. Anyone who uses these words loosely — "I've made great progress" — without reference to this axis, reveals they have no relationship with what Krishna is actually saying.</p>`},
  {front:`<h2>3.11 Why must yagya hurt — and why is painless sacrifice not real sacrifice?</h2>`,back:`<p>When you withdraw investment from darkness (sell the wrong stock), <strong>you must sell at a loss.</strong> You won't get to wait until it "feels worthless" — that day never fully comes. At the moment of letting go, the thing still appears valuable; moha still whispers "keep it." If giving something up felt easy and obvious, it wasn't yagya — it was just discarding trash. Real yagya means the heart trembles as the hand offers. The pain is the proof of authenticity. "Nuksan hota ho to bhi bech do" — sell even at a loss, and reinvest where it matters.</p>`},
  {front:`<h2>3.12 What does "nirlep" mean and why is it the sign of the wise?</h2>`,back:`<p>Lep comes from the same root as lipta (smeared, stuck). <strong>Nirlep = non-stick — one on whom nothing clings.</strong> "Dariya mein bhije nahi, dikhe dariya maahi" — standing in the river but not getting wet. The sthit-pragya neither pursues nor avoids: joy comes, it's experienced; pain comes, it's experienced. No invitation, no rejection. The one who doesn't know themselves clings to everything like a donkey carrying sand or jewels equally — not knowing the difference, because they don't know themselves.</p>`},
  {front:`<h2>3.12 Why is the greatest sadhana simply watching the one who says "grab it"?</h2>`,back:`<p>Many sadhanas exist: silence, stillness, fasting, walking. But the highest is <strong>constant self-observation</strong> — the moment the inner voice says "pakdo" (grab it), catch it: "Kaun bola? Main bola." Not to attack the aham — it's not your enemy, it's your own pet monkey. Don't beat it, but don't let it run your meditation either. Just seeing is enough. Knowing is sufficient. The child playing hide-and-seek pops its head out — you don't grab it, you just spot it. That's the whole game.</p>`},
  {front:`<h2>3.12 Why is prakriti not dirty — and what actually makes things dirty?</h2>`,back:`<p>Vedanta does not condemn prakriti. Prakriti has its own beauty when you remain its witness. <strong>It becomes polluted only when your vasna touches it.</strong> Like a child dipping fingers in the glass of water — the water (H2O) is still pure; your touch made it unclean <em>for you.</em> Kusangati is not about the object being bad — any object becomes harmful the moment you grasp it with the intention to consume. "Baat uski nahi, iski hai" — the problem is never in the object, always in the one who grasps.</p>`},
  {front:`<h2>3.12 What is mukti really — and why do saints sing?</h2>`,back:`<p>Mukti is waking from a nightmare. In the dream, someone died — it was absolutely real. Then you wake up. <strong>No one had died. Nothing had happened.</strong> That relief — "jaan mein jaan aayi" — is what mukti feels like. Saints sing not because they gained something, but because they were released. "Kya mila? Rihaai." Ahimsa = rihaai. Satya = rihaai. Aparigraha = rihaai. And the deepest joke: mukti is the last lie. After it, no more lies remain.</p>`},
  {front:`<h2>3.12 How does your grip make even the infinite small?</h2>`,back:`<p>Try to grab the sky — your fist catches a handful. <strong>Whatever aham clutches becomes small.</strong> Say "my atma" and atma shrinks to your size. Great avatars become household trinkets the moment they become "your deity" — good only for kaamna-purti and causing riots. Even the infinite, if truly infinite, is already inside and outside you — why grab what you're already within? Yagya means stopping this arrogance: "Chhod diya toh chhod ke pa liya. Pakdoge toh kho jayega."</p>`},
  {front:`<h2>3.12 What is the real meaning of yagya — what are you actually offering?</h2>`,back:`<p>Not ghee. Not fruit. Not a goat. <strong>You are offering your pakad (grip).</strong> Every dharmic tradition says "let go," but people misunderstand — they think the object is sinful, so they sacrifice some external thing. The Eid sacrifice was meant to be about giving up your son (what you're attached to), not slaughtering a goat you had no bond with. Yagya = loosening your grip on whatever you've been clutching. The object was never the problem. Your grip was.</p>`},
  {front:`<h2>3.12 Who is a "chor" (thief) according to Krishna?</h2>`,back:`<p>A chor is one who grasps the parai (foreign). Of the three — atma, aham, prakriti — prakriti is parai for aham. Aham's true relationship is prem with atma; its relationship with prakriti is moh. To consume prakriti without first performing yagya (releasing your grip) is theft — stealing from a realm that was never yours. Saints use the metaphor: prakriti is naihar (maiden home, the body's origin), atma is piya ka ghar (beloved's home). If you go to piya's house but only engage with the body, you never actually left naihar.</p>`},
  {front:`<h2>3.13 Why does everything you encounter deserve the curiosity you'd give a stranger?</h2>`,back:`<p>You don't know yourself — so you certainly don't know anything outside yourself. Every object, person, situation is genuinely <strong>unknown.</strong> But the mind treats everything as familiar and immediately tries to consume it — like a child putting everything in its mouth. The antidote: meet everything as new. "Yeh kya hai? Tum kaun ho?" Wake up, look in the mirror, and ask: "Where did you come from?" This jaagrit utsukta (awakened curiosity) is what transforms bhog into bodh.</p>`},
  {front:`<h2>3.13 Why did India decline despite having the Gita?</h2>`,back:`<p>Because the shloka never became a <strong>sutra</strong> (tool/formula). A shloka remembered but not applied is like a diamond used as a paperweight — all weight, no value. Or like a room with full electrical infrastructure but no one pressing the switch — same darkness as a cave. The gap between shloka and sutra is the gap between patthar (stone) and heera (diamond). Premature shraddha killed the jignyasa. Heads bowed for 20 generations without understanding; now the new generation rejects without reading. Both share one disease: neither actually engaged.</p>`},
  {front:`<h2>3.13 Why is yagya a declaration of freedom — not helplessness?</h2>`,back:`<p>Sartre said "Man is condemned to be free." You can choose anything, but you cannot choose not to choose. Even choosing not to act was your choice. <strong>Yagya is the assertion that swaha is always possible</strong> — in the worst circumstances, in the deepest mess, you can still offer everything to the fire. No one is truly stuck. The one freedom you cannot escape is the freedom to choose between prakriti and atma. This is both your only bondage and your only liberation.</p>`},
  {front:`<h2>3.13 Why is paap always against yourself — never against others?</h2>`,back:`<p>The thief punishes himself the moment he becomes the kind of person who steals. Legal punishment is just a <strong>sthool reminder</strong> of the sookshm damage already done. Paap = any decision that deepens your apoornata (incompleteness). Declaring yourself helpless — paap. Declaring yourself dependent — paap. Declaring yourself a victim of circumstances — paap. Punya has only one meaning: choices that move aham toward poornata. No external ritual can undo what you've done to your own chetna.</p>`},
  {front:`<h2>3.13 What is the simplest method to stop bhog?</h2>`,back:`<p>Bhog requires ignorance. You can only consume what you don't fully understand. <strong>Don't say "I won't enjoy it" — say "Let me know it a little more first."</strong> Ask the vishay: "Tell me more about yourself." As it reveals itself, your attraction cools. Knowing is the natural enemy of consuming. And knowing is inevitable (Sartre: you're condemned to be free, and condemned to eventually know). The tragedy is knowing too late — after you've already signed the contract of bhog.</p>`},
  {front:`<h2>3.13 What is prasad — and why does giving produce more than keeping?</h2>`,back:`<p>Two meanings: <strong>Sthool</strong> — what remains for the body after yagya; always sufficient, because the body never needed much. <strong>Sookshm</strong> — the anand that arises from giving itself. You gave everything to the fire, yet trupti keeps flowing. This joy <em>is</em> the prasad. And unlike material things, it multiplies when shared. "Poornasya poornmadaya poornameva avashishyate" — take everything from the full, and fullness remains. This is the mind's law.</p>`},
  {front:`<h2>3.13 Why does the mind's hunger work opposite to the body's?</h2>`,back:`<p>Body fills up — eat and you're satisfied. Mind works in reverse: <strong>the more you feed it, the hungrier it gets.</strong> Whatever is present in the mind creates desire for more of itself. A shirt first enters the mind, generates craving, then lands on the body. The mind's trupti comes from <em>emptying</em>, not filling. Yagya = emptying the mind by saying swaha. The moment you let go, the hunger dies. "Mun ko bharna hai toh mun ko khaali kar do."</p>`},
  {front:`<h2>Why can't jnana yoga, karma yoga, and bhakti yoga be separate paths?</h2>`,back:`<p>Knowledge that doesn't become action is false. Action without knowledge is blind (sakaam). And knowledge can't arise without love (bhakti) — you must want liberation before it comes. They are one inseparable movement, not three choices.</p>`},
];

// DEDUP + SORT
// ═══════════════════════════════════════════
const seen = new Set();
const ALL_CARDS = RAW_CARDS.filter(c => {
  const key = c.front.trim();
  if (seen.has(key)) return false;
  seen.add(key);
  return true;
});

function extractVerse(html) {
  const m = html.match(/(\d+)\.(\d+)(?:-(\d+))?/);
  if (!m) return { key: 'General', ch: 99, vStart: 99, vEnd: 99, label: 'General' };
  const ch = parseInt(m[1]);
  const vStart = parseInt(m[2]);
  const vEnd = m[3] ? parseInt(m[3]) : vStart;
  return { key: m[0], ch, vStart, vEnd, label: m[0] };
}

// Sort ALL_CARDS by verse number
ALL_CARDS.sort((a, b) => {
  const va = extractVerse(a.front);
  const vb = extractVerse(b.front);
  if (va.ch !== vb.ch) return va.ch - vb.ch;
  if (va.vStart !== vb.vStart) return va.vStart - vb.vStart;
  return va.vEnd - vb.vEnd;
});

// Build verse groups
const VERSE_ORDER = [];
const VERSE_MAP = {};
ALL_CARDS.forEach(c => {
  const v = extractVerse(c.front);
  if (!VERSE_MAP[v.key]) {
    VERSE_MAP[v.key] = { ...v, count: 0 };
    VERSE_ORDER.push(v.key);
  }
  VERSE_MAP[v.key].count++;
});

// "All" button
const allBtn = document.createElement('button');
allBtn.className = 'verse-btn all-btn active';
allBtn.dataset.verse = 'all';
allBtn.innerHTML = `<span class="verse-num">All</span><span class="verse-label">सम्पूर्ण</span><span class="verse-count">${ALL_CARDS.length}</span>`;
sidebarList.appendChild(allBtn);

VERSE_ORDER.forEach(key => {
  const v = VERSE_MAP[key];
  const btn = document.createElement('button');
  btn.className = 'verse-btn';
  btn.dataset.verse = key;
  btn.innerHTML = `<span class="verse-num">${v.label}</span><span class="verse-count">${v.count}</span>`;
  sidebarList.appendChild(btn);
});

// ═══════════════════════════════════════════
// STATE + RENDER
// ═══════════════════════════════════════════
let currentCards = [...ALL_CARDS];
let idx = 0;
let activeVerse = 'all';
let isShuffled = false;

const card = document.getElementById('card');
const frontContent = document.getElementById('frontContent');
const backContent = document.getElementById('backContent');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const navCounter = document.getElementById('navCounter');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const shuffleBtn = document.getElementById('shuffleBtn');

function render() {
  card.classList.remove('flipped');
  const c = currentCards[idx];
  frontContent.innerHTML = c.front;
  backContent.innerHTML = c.back;
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === currentCards.length - 1;
  navCounter.textContent = `${idx + 1} / ${currentCards.length}`;
  progressText.textContent = `${idx + 1} / ${currentCards.length}`;
  progressFill.style.width = `${((idx + 1) / currentCards.length) * 100}%`;
  // Highlight sidebar
  highlightSidebar();
}

function highlightSidebar() {
  sidebarList.querySelectorAll('.verse-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.verse === activeVerse);
  });
}

function autoHeight() {
  const front = card.querySelector('.card-front');
  const back = card.querySelector('.card-back');
  card.style.minHeight = '';
  const h = Math.max(front.scrollHeight, back.scrollHeight, 360);
  card.style.minHeight = h + 'px';
}

function filterByVerse(key) {
  activeVerse = key;
  isShuffled = false;
  shuffleBtn.classList.remove('shuffled');
  if (key === 'all') {
    currentCards = [...ALL_CARDS];
  } else {
    currentCards = ALL_CARDS.filter(c => extractVerse(c.front).key === key);
  }
  idx = 0;
  render();
  setTimeout(autoHeight, 50);
}

// Sidebar clicks
sidebarList.addEventListener('click', e => {
  const btn = e.target.closest('.verse-btn');
  if (!btn) return;
  filterByVerse(btn.dataset.verse);
  // Close mobile sidebar
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
});

// ── Reveal sound (soft shimmer/sweep) ──
function playReveal() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const now = ctx.currentTime;

  // Filtered noise burst — breathy whoosh
  const bufSize = ctx.sampleRate * 0.4;
  const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  const noise = ctx.createBufferSource();
  noise.buffer = buf;

  const noiseFilter = ctx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.setValueAtTime(600, now);
  noiseFilter.frequency.exponentialRampToValueAtTime(2500, now + 0.15);
  noiseFilter.frequency.exponentialRampToValueAtTime(400, now + 0.35);
  noiseFilter.Q.value = 0.8;

  const noiseGain = ctx.createGain();
  noiseGain.gain.setValueAtTime(0, now);
  noiseGain.gain.linearRampToValueAtTime(0.07, now + 0.05);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);

  noise.connect(noiseFilter).connect(noiseGain).connect(ctx.destination);

  // Warm low tone — grounding hum
  const tone = ctx.createOscillator();
  tone.type = 'triangle';
  tone.frequency.setValueAtTime(280, now);
  tone.frequency.linearRampToValueAtTime(320, now + 0.2);

  const toneGain = ctx.createGain();
  toneGain.gain.setValueAtTime(0, now);
  toneGain.gain.linearRampToValueAtTime(0.06, now + 0.04);
  toneGain.gain.exponentialRampToValueAtTime(0.001, now + 0.25);

  tone.connect(toneGain).connect(ctx.destination);

  noise.start(now);
  tone.start(now);
  tone.stop(now + 0.3);
  setTimeout(() => ctx.close(), 600);
}

// Card flip
card.addEventListener('click', () => {
  card.classList.toggle('flipped');
  playReveal();
  setTimeout(autoHeight, 50);
});

// Nav
prevBtn.addEventListener('click', () => { if (idx > 0) { idx--; render(); setTimeout(autoHeight, 50); } });
nextBtn.addEventListener('click', () => { if (idx < currentCards.length - 1) { idx++; render(); setTimeout(autoHeight, 50); } });

// Shuffle
shuffleBtn.addEventListener('click', () => {
  if (isShuffled) {
    // Unshuffle — restore sorted order
    filterByVerse(activeVerse);
    return;
  }
  for (let i = currentCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentCards[i], currentCards[j]] = [currentCards[j], currentCards[i]];
  }
  isShuffled = true;
  shuffleBtn.classList.add('shuffled');
  idx = 0;
  render();
  setTimeout(autoHeight, 50);
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { prevBtn.click(); }
  else if (e.key === 'ArrowRight') { nextBtn.click(); }
  else if (e.key === ' ') { e.preventDefault(); card.click(); }
  else if (e.key === 'm' || e.key === 'M') { musicBtn.click(); }
});

// Mobile sidebar
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');
const sidebarToggle = document.getElementById('sidebarToggle');

sidebarToggle.addEventListener('click', () => {
  sidebar.classList.toggle('open');
  overlay.classList.toggle('show');
});
overlay.addEventListener('click', () => {
  sidebar.classList.remove('open');
  overlay.classList.remove('show');
});

// ═══════════════════════════════════════════
// TANPURA — Web Audio API drone
// ═══════════════════════════════════════════
let audioCtx = null;
let tanpuraNodes = null;
let isPlaying = false;

const musicBtn = document.getElementById('musicBtn');
const musicIcon = document.getElementById('musicIcon');
const musicLabel = document.getElementById('musicLabel');
const volumeRow = document.getElementById('volumeRow');
const volumeSlider = document.getElementById('volumeSlider');

function createTanpura() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master gain
  const master = audioCtx.createGain();
  master.gain.value = volumeSlider.value / 100 * 0.5;
  master.connect(audioCtx.destination);

  // Sa (C3 ≈ 130.81 Hz) — root drone
  const sa = createDroneVoice(audioCtx, 130.81, master, 0.35);
  // Low Sa (C2 ≈ 65.41 Hz) — bass
  const saLow = createDroneVoice(audioCtx, 65.41, master, 0.2);
  // Pa (G3 ≈ 196.00 Hz) — fifth
  const pa = createDroneVoice(audioCtx, 196.00, master, 0.18);
  // Sa high (C4 ≈ 261.63 Hz) — octave shimmer
  const saHigh = createDroneVoice(audioCtx, 261.63, master, 0.08);

  tanpuraNodes = { master, voices: [sa, saLow, pa, saHigh] };
}

function createDroneVoice(ctx, freq, dest, vol) {
  // Sawtooth for rich harmonics, then filter to soften
  const osc = ctx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.value = freq;

  // Slow vibrato for the "living" quality
  const vibrato = ctx.createOscillator();
  vibrato.type = 'sine';
  vibrato.frequency.value = 0.15 + Math.random() * 0.1;
  const vibGain = ctx.createGain();
  vibGain.gain.value = freq * 0.003;
  vibrato.connect(vibGain);
  vibGain.connect(osc.frequency);
  vibrato.start();

  // Low-pass filter to soften
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = freq * 4;
  filter.Q.value = 0.5;

  // Voice gain
  const gain = ctx.createGain();
  gain.gain.value = vol;

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(dest);
  osc.start();

  return { osc, vibrato, gain };
}

function startTanpura() {
  if (!audioCtx) createTanpura();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  // Fade in
  const now = audioCtx.currentTime;
  tanpuraNodes.master.gain.setValueAtTime(0, now);
  tanpuraNodes.master.gain.linearRampToValueAtTime(volumeSlider.value / 100 * 0.5, now + 2);
  isPlaying = true;
  musicBtn.classList.add('playing');
  musicIcon.textContent = '♫';
  musicLabel.textContent = 'Tanpura On';
  volumeRow.classList.add('show');
}

function stopTanpura() {
  if (!audioCtx || !tanpuraNodes) return;
  const now = audioCtx.currentTime;
  tanpuraNodes.master.gain.setValueAtTime(tanpuraNodes.master.gain.value, now);
  tanpuraNodes.master.gain.linearRampToValueAtTime(0, now + 1.5);
  setTimeout(() => { audioCtx.suspend(); }, 2000);
  isPlaying = false;
  musicBtn.classList.remove('playing');
  musicIcon.textContent = '♪';
  musicLabel.textContent = 'Tanpura';
  volumeRow.classList.remove('show');
}

musicBtn.addEventListener('click', () => {
  if (isPlaying) stopTanpura(); else startTanpura();
});

volumeSlider.addEventListener('input', () => {
  if (tanpuraNodes && audioCtx) {
    tanpuraNodes.master.gain.linearRampToValueAtTime(
      volumeSlider.value / 100 * 0.5,
      audioCtx.currentTime + 0.1
    );
  }
});

// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
render();
setTimeout(autoHeight, 100);
window.addEventListener('resize', autoHeight);
</script>
</body>
</html>
